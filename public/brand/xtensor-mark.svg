      <rect width="14" height="14" fill="transparent"></rect>
      <rect x="7" width="7" height="14" fill="#0a0a0a"></rect>
    </pattern>
    <pattern id="hatchB2" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(-45)">
