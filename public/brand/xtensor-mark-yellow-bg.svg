<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <pattern id="hatchA" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="#0a0a0a"></rect>
      <rect x="7" width="7" height="14" fill="#FFD400"></rect>
    </pattern>
    <pattern id="hatchB" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(-45)">
      <rect width="14" height="14" fill="#0a0a0a"></rect>
      <rect x="7" width="7" height="14" fill="#FFD400"></rect>
    </pattern>
    <clipPath id="wT"><polygon points="0,0 200,0 100,100"></polygon></clipPath>
    <clipPath id="wR"><polygon points="200,0 200,200 100,100"></polygon></clipPath>
    <clipPath id="wB"><polygon points="200,200 0,200 100,100"></polygon></clipPath>
    <clipPath id="wL"><polygon points="0,200 0,0 100,100"></polygon></clipPath>
  </defs>
  <rect width="200" height="200" fill="#FFD400"></rect>
  <rect width="200" height="200" fill="url(#hatchA)" clip-path="url(#wT)"></rect>
  <rect width="200" height="200" fill="url(#hatchB)" clip-path="url(#wR)"></rect>
  <rect width="200" height="200" fill="url(#hatchA)" clip-path="url(#wB)"></rect>
  <rect width="200" height="200" fill="url(#hatchB)" clip-path="url(#wL)"></rect>
  
  <polygon points="100,80 120,100 100,120 80,100" fill="#0a0a0a"></polygon>
</svg>