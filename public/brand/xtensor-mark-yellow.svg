<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <pattern id="hatchA3" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="transparent"></rect>
      <rect x="7" width="7" height="14" fill="#FFD400"></rect>
    </pattern>
    <pattern id="hatchB3" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(-45)">
      <rect width="14" height="14" fill="transparent"></rect>
      <rect x="7" width="7" height="14" fill="#FFD400"></rect>
    </pattern>
    <clipPath id="wT3"><polygon points="0,0 200,0 100,100"></polygon></clipPath>
    <clipPath id="wR3"><polygon points="200,0 200,200 100,100"></polygon></clipPath>
    <clipPath id="wB3"><polygon points="200,200 0,200 100,100"></polygon></clipPath>
    <clipPath id="wL3"><polygon points="0,200 0,0 100,100"></polygon></clipPath>
  </defs>
  <rect width="200" height="200" fill="url(#hatchA3)" clip-path="url(#wT3)"></rect>
  <rect width="200" height="200" fill="url(#hatchB3)" clip-path="url(#wR3)"></rect>
  <rect width="200" height="200" fill="url(#hatchA3)" clip-path="url(#wB3)"></rect>
  <rect width="200" height="200" fill="url(#hatchB3)" clip-path="url(#wL3)"></rect>
  <polygon points="100,80 120,100 100,120 80,100" fill="#FFD400"></polygon>
</svg>